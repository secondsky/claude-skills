name: Validate Frontmatter

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-frontmatter:
    name: Validate SKILL.md Frontmatter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Make script executable
        run: chmod +x scripts/validate-frontmatter.sh

      - name: Validate changed SKILL.md files
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          CHANGED=$(git diff --diff-filter=d --name-only "origin/${BASE_REF}...HEAD" | grep 'SKILL\.md$' || true)
          if [ -z "$CHANGED" ]; then
            echo "No SKILL.md files changed, skipping validation"
            exit 0
          fi
          echo "Validating changed SKILL.md files:"
          echo "$CHANGED"
          FAILED=0
          for file in $CHANGED; do
            dir=$(dirname "$GITHUB_WORKSPACE/$file")
            echo "Validating: $dir"
            if ! ./scripts/validate-frontmatter.sh --dir "$dir" --quiet; then
              FAILED=$((FAILED + 1))
            fi
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED skill(s) failed frontmatter validation"
            exit 1
          fi

      - name: Check no Keywords in description
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          FOUND=0
          CHANGED=$(git diff --diff-filter=d --name-only "origin/${BASE_REF}...HEAD" | grep 'SKILL\.md$' || true)
          if [ -z "$CHANGED" ]; then
            echo "No SKILL.md files changed, skipping keyword check"
            exit 0
          fi
          for f in $CHANGED; do
            if grep -q 'Keywords:' "$f" 2>/dev/null; then
              echo "::error file=$f::Keywords must be in metadata.keywords, not in description"
              FOUND=$((FOUND + 1))
            fi
          done
          if [ "$FOUND" -gt 0 ]; then
            echo "::error::$FOUND SKILL.md file(s) have Keywords in frontmatter (should be in metadata.keywords)"
            exit 1
          fi
          echo "No Keywords found in description fields."

      - name: Validate all SKILL.md frontmatter
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          ./scripts/validate-frontmatter.sh

      - name: Summary
        if: always()
        run: |
          set -euo pipefail
          echo "### Frontmatter Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Validated \`SKILL.md\` files in \`plugins/\`" >> $GITHUB_STEP_SUMMARY
          echo "Run \`./scripts/validate-frontmatter.sh\` locally to check before pushing." >> $GITHUB_STEP_SUMMARY
